<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

<div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">

        <h1 class="text-4xl font-bold">
            Support CRM Dashboard
        </h1>

        <a
            href="/"
            class="bg-blue-600 text-white px-5 py-3 rounded-lg hover:bg-blue-700"
        >
            Customer Portal
        </a>

    </div>


    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-gray-500 text-lg">Total Tickets</h2>

            <p
                id="totalTickets"
                class="text-4xl font-bold mt-2"
            >
                0
            </p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-gray-500 text-lg">Open Tickets</h2>

            <p
                id="openTickets"
                class="text-4xl font-bold text-red-500 mt-2"
            >
                0
            </p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-gray-500 text-lg">In Progress</h2>

            <p
                id="progressTickets"
                class="text-4xl font-bold text-yellow-500 mt-2"
            >
                0
            </p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-gray-500 text-lg">Closed Tickets</h2>

            <p
                id="closedTickets"
                class="text-4xl font-bold text-green-600 mt-2"
            >
                0
            </p>
        </div>

    </div>


    <!-- Search & Filter -->
    <div class="bg-white p-6 rounded-xl shadow-md mb-8">

        <div class="flex flex-col md:flex-row gap-4">

            <input
                type="text"
                id="searchInput"
                placeholder="Search by customer, email, subject..."
                class="border border-gray-300 p-3 rounded-lg w-full"
            >

            <select
                id="statusFilter"
                class="border border-gray-300 p-3 rounded-lg"
            >
                <option value="">All Status</option>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
            </select>

        </div>

    </div>


    <!-- Ticket Table -->
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">

        <div class="overflow-x-auto">

            <table class="w-full border-collapse">

                <thead class="bg-gray-200">

                    <tr>
                        <th class="p-4 text-left">Ticket ID</th>
                        <th class="p-4 text-left">Customer</th>
                        <th class="p-4 text-left">Subject</th>
                        <th class="p-4 text-left">Status</th>
                        <th class="p-4 text-left">Actions</th>
                    </tr>

                </thead>

                <tbody id="ticketTableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>


<!-- Ticket Details Modal -->
<div
    id="ticketModal"
    class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50"
>

    <div class="bg-white w-full max-w-2xl rounded-xl shadow-xl p-8 relative">

        <!-- Close Button -->
        <button
            onclick="closeModal()"
            class="absolute top-4 right-4 text-2xl font-bold text-gray-500 hover:text-black"
        >
            ×
        </button>

        <h2 class="text-3xl font-bold mb-6">
            Ticket Details
        </h2>

        <div class="space-y-4">

            <div>
                <span class="font-semibold">Ticket ID:</span>
                <span id="modalTicketId"></span>
            </div>

            <div>
                <span class="font-semibold">Customer Name:</span>
                <span id="modalCustomerName"></span>
            </div>

            <div>
                <span class="font-semibold">Customer Email:</span>
                <span id="modalCustomerEmail"></span>
            </div>

            <div>
                <span class="font-semibold">Subject:</span>
                <span id="modalSubject"></span>
            </div>

            <div>
                <span class="font-semibold">Status:</span>
                <span id="modalStatus"></span>
            </div>

            <div>
                <span class="font-semibold">Created At:</span>
                <span id="modalCreatedAt"></span>
            </div>

            <div>
                <span class="font-semibold block mb-2">
                    Description:
                </span>

                <div
                    id="modalDescription"
                    class="bg-gray-100 p-4 rounded-lg"
                ></div>
            </div>

        </div>

    </div>

</div>


<!-- Toast Notification -->
<div
    id="toast"
    class="fixed top-5 right-5 hidden bg-green-600 text-white px-6 py-4 rounded-lg shadow-lg z-50"
>
</div>


<script>

function showToast(message) {

    const toast = document.getElementById("toast");

    toast.innerText = message;

    toast.classList.remove("hidden");

    setTimeout(() => {

        toast.classList.add("hidden");

    }, 3000);
}


async function loadTickets() {

    const search =
        document.getElementById("searchInput").value;

    const status =
        document.getElementById("statusFilter").value;

    let url = "/api/tickets?";

    if (search) {
        url += `search=${search}&`;
    }

    if (status) {
        url += `status=${status}`;
    }

    const response = await fetch(url);

    const tickets = await response.json();

    const tableBody =
        document.getElementById("ticketTableBody");

    tableBody.innerHTML = "";

    // Dashboard Stats
    document.getElementById("totalTickets").innerText =
        tickets.length;

    document.getElementById("openTickets").innerText =
        tickets.filter(
            ticket => ticket.status === "Open"
        ).length;

    document.getElementById("progressTickets").innerText =
        tickets.filter(
            ticket => ticket.status === "In Progress"
        ).length;

    document.getElementById("closedTickets").innerText =
        tickets.filter(
            ticket => ticket.status === "Closed"
        ).length;


    // Empty State
    if (tickets.length === 0) {

        tableBody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center p-8 text-gray-500">
                    No tickets found
                </td>
            </tr>
        `;

        return;
    }


    tickets.forEach(ticket => {

        let statusColor = "";

        if (ticket.status === "Open") {

            statusColor = "bg-red-500";

        } else if (ticket.status === "In Progress") {

            statusColor = "bg-yellow-500";

        } else {

            statusColor = "bg-green-600";
        }

        tableBody.innerHTML += `

            <tr class="border-b hover:bg-gray-50">

                <td class="p-4 font-medium">
                    ${ticket.ticket_id}
                </td>

                <td class="p-4">

                    <div class="font-semibold">
                        ${ticket.customer_name}
                    </div>

                    <div class="text-sm text-gray-500">
                        ${ticket.customer_email}
                    </div>

                </td>

                <td class="p-4">
                    ${ticket.subject}
                </td>

                <td class="p-4">

                    <span class="
                        ${statusColor}
                        text-white
                        px-3 py-1
                        rounded-full
                        text-sm
                    ">
                        ${ticket.status}
                    </span>

                </td>

                <td class="p-4 flex gap-2 flex-wrap">

                    <button
                        onclick="viewTicketDetails('${ticket.ticket_id}')"
                        class="bg-blue-600 text-white px-3 py-2 rounded hover:bg-blue-700"
                    >
                        View
                    </button>

                    <button
                        onclick="updateTicketStatus('${ticket.ticket_id}', 'In Progress')"
                        class="bg-yellow-500 text-white px-3 py-2 rounded hover:bg-yellow-600"
                    >
                        Progress
                    </button>

                    <button
                        onclick="updateTicketStatus('${ticket.ticket_id}', 'Closed')"
                        class="bg-green-600 text-white px-3 py-2 rounded hover:bg-green-700"
                    >
                        Close
                    </button>

                </td>

            </tr>

        `;
    });

}


async function updateTicketStatus(ticketId, statusValue) {

    await fetch(`/api/tickets/${ticketId}`, {

        method: "PUT",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            status: statusValue
        })

    });

    showToast(
        `Ticket status updated to ${statusValue}`
    );

    loadTickets();
}


async function viewTicketDetails(ticketId) {

    const response =
        await fetch(`/api/tickets/${ticketId}`);

    const ticket = await response.json();

    document.getElementById("modalTicketId").innerText =
        ticket.ticket_id;

    document.getElementById("modalCustomerName").innerText =
        ticket.customer_name;

    document.getElementById("modalCustomerEmail").innerText =
        ticket.customer_email;

    document.getElementById("modalSubject").innerText =
        ticket.subject;

    document.getElementById("modalStatus").innerText =
        ticket.status;

    document.getElementById("modalCreatedAt").innerText =
        ticket.created_at;

    document.getElementById("modalDescription").innerText =
        ticket.description;

    document
        .getElementById("ticketModal")
        .classList.remove("hidden");
}


function closeModal() {

    document
        .getElementById("ticketModal")
        .classList.add("hidden");
}


document
    .getElementById("searchInput")
    .addEventListener("input", loadTickets);

document
    .getElementById("statusFilter")
    .addEventListener("change", loadTickets);


loadTickets();

</script>

</body>
</html>
